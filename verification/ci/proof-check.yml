name: proof-check

on:
  push:
    paths:
      - 'verification/**'
      - 'kernel/src/**'
  pull_request:
    paths:
      - 'verification/**'
      - 'kernel/src/**'

jobs:
  coq-proofs:
    name: Coq proof compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Coq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y coq

      - name: Verify Coq version
        run: coqc --version

      - name: Compile Coq theories
        run: bash verification/scripts/proof_check.sh

      - name: Upload compiled proof artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coq-vo-artifacts
          path: |
            verification/theories/*.vo
            verification/theories/*.vos
            verification/theories/*.vok
          retention-days: 90

  manifest-check:
    name: Verify artifact manifest
    runs-on: ubuntu-latest
    needs: coq-proofs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate manifest.json schema
        run: |
          python3 -c "
          import json, sys
          with open('verification/artifacts/manifest.json') as f:
              m = json.load(f)
          required = ['commit_sha', 'generated_at', 'assumptions_version', 'theorems', 'ci_runs', 'runtime_evidence']
          missing = [k for k in required if k not in m]
          if missing:
              print('manifest.json missing keys:', missing, file=sys.stderr)
              sys.exit(1)
          todos = [k for k, v in m.items() if v == 'TODO' or v == []]
          if todos:
              print('manifest.json has unresolved TODO fields:', todos, file=sys.stderr)
              sys.exit(1)
          print('manifest.json OK — theorems:', len(m['theorems']))
          "

      - name: Check THEOREM_INDEX has no Planned entries
        run: |
          if grep -q "Status: Planned" verification/proof/THEOREM_INDEX.md; then
            echo "ERROR: THEOREM_INDEX.md still has 'Planned' entries — promote to InProgress or higher." >&2
            grep "Status: Planned" verification/proof/THEOREM_INDEX.md >&2
            exit 1
          fi
          echo "THEOREM_INDEX OK"

      - name: Check ASSUMPTIONS has no TODO entries
        run: |
          if grep -q "^- ASM-.*: TODO" verification/spec/ASSUMPTIONS.md; then
            echo "ERROR: ASSUMPTIONS.md has unresolved TODO entries." >&2
            exit 1
          fi
          echo "ASSUMPTIONS OK"
