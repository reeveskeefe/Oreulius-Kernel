<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="28" viewBox="0 0 200 28" role="img" aria-label="Made in Canada">
  <defs>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#2b2b2b"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="200" height="28" rx="6" fill="url(#leftGrad)"/>
  <rect x="100" y="0" width="100" height="28" rx="6" fill="url(#rightGrad)"/>

  <!-- Divider -->
  <rect x="100" y="0" width="1" height="28" fill="rgba(255,255,255,0.2)"/>

  <!-- Text -->
  <g fill="#ffffff" font-family="Verdana, DejaVu Sans, sans-serif" font-size="13">
    <text x="50" y="14" text-anchor="middle" dominant-baseline="middle">Born in</text>
    <text x="130" y="14" text-anchor="middle" dominant-baseline="middle">Canada</text>
  </g>

  <!-- White backing circle -->
  <circle cx="175" cy="14" r="10" fill="#ffffff"/>

  <!-- Emoji (visually centered with micro offset) -->
  <text x="176" y="14"
        font-size="14"
        text-anchor="middle"
        dominant-baseline="middle">
    🍁
  </text>
</svg>