<svg width="920" height="620" viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <style>
      .box-title {
        font-size: 17px;
        font-weight: 700;
        dominant-baseline: central;
      }
      .box-sub {
        font-size: 13px;
        font-weight: 500;
        dominant-baseline: central;
      }
      .edge {
        fill: none;
        stroke: #8b8b86;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .edge-label {
        font-size: 13px;
        fill: #5d5d58;
        font-weight: 500;
      }
      .legend-text {
        font-size: 13px;
        fill: #4f4f4b;
        dominant-baseline: central;
      }
    </style>
  </defs>

  <!-- Top node -->
  <rect x="330" y="40" width="260" height="64" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text class="box-title" x="460" y="72" text-anchor="middle" fill="#26215C">IPC Admission</text>

  <!-- Middle row -->
  <rect x="80" y="220" width="260" height="74" rx="14" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text class="box-title" x="210" y="247" text-anchor="middle" fill="#4A1B0C">CapabilityManager</text>
  <text class="box-sub" x="210" y="272" text-anchor="middle" fill="#7A341C">predictive_revoke_capabilities</text>

  <rect x="580" y="220" width="260" height="74" rx="14" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text class="box-title" x="710" y="247" text-anchor="middle" fill="#412402">SecurityService</text>
  <text class="box-sub" x="710" y="272" text-anchor="middle" fill="#7A4A10">predictive checks</text>

  <!-- Bottom row -->
  <rect x="170" y="430" width="240" height="68" rx="14" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text class="box-title" x="290" y="456" text-anchor="middle" fill="#2C2C2A">Audit log</text>
  <text class="box-sub" x="290" y="480" text-anchor="middle" fill="#5F5E5A">log_event AuditEntry</text>

  <rect x="510" y="430" width="260" height="68" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text class="box-title" x="640" y="456" text-anchor="middle" fill="#04342C">Tick-based restore</text>
  <text class="box-sub" x="640" y="480" text-anchor="middle" fill="#0F6E56">restriction_until_tick</text>

  <!-- IPC -> CapabilityManager -->
  <path class="edge" d="M330 72 L210 72 L210 220"/>
  <text class="edge-label" x="105" y="128">PredictiveRestriction</text>
  <text class="edge-label" x="105" y="148">refusal · reject_send</text>
  <text class="edge-label" x="105" y="168">/ reject_recv</text>

  <!-- IPC -> SecurityService -->
  <path class="edge" d="M590 72 L710 72 L710 220"/>
  <text class="edge-label" x="728" y="112">is_predictively_restricted?</text>
  <text class="edge-label" x="728" y="132">intent_capability_denied</text>
  <text class="edge-label" x="728" y="152">intent_invalid_capability</text>

  <!-- IPC -> Audit log -->
  <path class="edge" d="M460 104 L460 390 L290 390 L290 430"/>
  <text class="edge-label" x="478" y="292">log_event AuditEntry</text>

  <!-- SecurityService -> Tick-based restore -->
  <path class="edge" d="M710 294 L710 390 L640 390 L640 430"/>
  <text class="edge-label" x="728" y="346">restriction_until_tick</text>

  <!-- CapabilityManager self-loop -->
  <path class="edge" d="M340 257 C390 257 390 317 340 317"/>
  <path class="edge" d="M340 317 L340 300"/>
  <text class="edge-label" x="398" y="264">revoke rights</text>
  <text class="edge-label" x="398" y="284">until restore_at tick</text>

  <!-- Legend -->
  <rect x="90" y="555" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text class="legend-text" x="112" y="562">IPC admission</text>

  <rect x="255" y="555" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text class="legend-text" x="277" y="562">Security</text>

  <rect x="365" y="555" width="14" height="14" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text class="legend-text" x="387" y="562">Capability mgmt</text>

  <rect x="540" y="555" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text class="legend-text" x="562" y="562">Audit</text>

  <rect x="640" y="555" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text class="legend-text" x="662" y="562">Restore</text>
</svg>