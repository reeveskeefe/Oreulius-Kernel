<svg width="680" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-size:14px; font-weight:600; fill:#1a1a1a; }
    .ts { font-size:12px; font-weight:400; fill:#555555; }
  </style>
</defs>

<!-- Tier 1: AffineEndpoint<4> -->
<rect x="210" y="30" width="260" height="60" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central" fill="#26215C">AffineEndpoint&lt;4&gt;</text>
<text class="ts" x="340" y="74" text-anchor="middle" dominant-baseline="central" fill="#534AB7">original holder</text>

<!-- E → E3 -->
<path d="M300 90 L180 190" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<!-- E → E1 -->
<path d="M380 90 L500 190" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="235" y="148" text-anchor="middle">delegate_zero_sum::&lt;3,1&gt;</text>
<text class="ts" x="440" y="148" text-anchor="middle">delegate_zero_sum::&lt;3,1&gt;</text>

<!-- Tier 2 left: AffineEndpoint<3> -->
<rect x="60" y="190" width="240" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="180" y="212" text-anchor="middle" dominant-baseline="central" fill="#04342C">AffineEndpoint&lt;3&gt;</text>
<text class="ts" x="180" y="234" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Process B</text>

<!-- Tier 2 right: AffineEndpoint<1> -->
<rect x="380" y="190" width="240" height="60" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="500" y="212" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">AffineEndpoint&lt;1&gt;</text>
<text class="ts" x="500" y="234" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Process C</text>

<!-- E3 → E3a -->
<path d="M150 250 L110 340" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<!-- E3 → E3b -->
<path d="M210 250 L270 340" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="150" y="300" text-anchor="end">delegate_zero_sum::&lt;2,1&gt;</text>
<text class="ts" x="240" y="300" text-anchor="start">delegate_zero_sum::&lt;2,1&gt;</text>

<!-- Tier 3 left: AffineEndpoint<2> -->
<rect x="20" y="340" width="200" height="50" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="120" y="365" text-anchor="middle" dominant-baseline="central" fill="#04342C">AffineEndpoint&lt;2&gt;</text>

<!-- Tier 3 right: AffineEndpoint<1> -->
<rect x="190" y="340" width="200" height="50" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="290" y="365" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">AffineEndpoint&lt;1&gt;</text>

<!-- Conservation note -->
<rect x="420" y="330" width="230" height="76" rx="8" fill="#F8F8F6" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" x="432" y="352" dominant-baseline="central" style="font-weight:600;fill:#2C2C2A">Zero-sum invariant</text>
<text class="ts" x="432" y="372" dominant-baseline="central">delegator = child + remainder</text>
<text class="ts" x="432" y="392" dominant-baseline="central">4 → (3 + 1),  3 → (2 + 1)</text>

<!-- Legend -->
<rect x="40" y="468" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="58" y="474" dominant-baseline="central">Original holder</text>
<rect x="176" y="468" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="194" y="474" dominant-baseline="central">Delegated (larger share)</text>
<rect x="380" y="468" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="398" y="474" dominant-baseline="central">Delegated (unit share)</text>
</svg>