<svg width="680" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-size:14px; font-weight:600; }
    .ts { font-size:12px; font-weight:400; fill:#555555; }
  </style>
</defs>

<!-- evaluate_send entry -->
<rect x="230" y="24" width="220" height="44" rx="22" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="46" text-anchor="middle" dominant-baseline="central" fill="#26215C">evaluate_send</text>

<line x1="340" y1="68" x2="340" y2="112" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- B: Predictively restricted? -->
<polygon points="340,112 460,148 340,184 220,148" fill="#F8F8F6" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="340" y="142" text-anchor="middle" dominant-baseline="central">Predictively</text>
<text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">restricted?</text>

<path d="M460 148 L560 148 L560 206" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="506" y="140" text-anchor="middle">Yes</text>
<rect x="480" y="206" width="160" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="560" y="222" text-anchor="middle" dominant-baseline="central" fill="#501313">Refuse:</text>
<text class="ts" x="560" y="238" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">PredictiveRestriction</text>

<line x1="340" y1="184" x2="340" y2="228" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="210" dominant-baseline="central">No</text>

<!-- C: can_send? -->
<polygon points="340,228 440,260 340,292 240,260" fill="#F8F8F6" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="340" y="260" text-anchor="middle" dominant-baseline="central">can_send?</text>

<path d="M440 260 L560 260 L560 318" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="494" y="252" text-anchor="middle">No</text>
<rect x="480" y="318" width="160" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="560" y="334" text-anchor="middle" dominant-baseline="central" fill="#501313">Refuse:</text>
<text class="ts" x="560" y="350" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">PermissionDenied</text>

<line x1="340" y1="292" x2="340" y2="336" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="318" dominant-baseline="central">Yes</text>

<!-- D: channel_id matches? -->
<polygon points="340,336 460,372 340,408 220,372" fill="#F8F8F6" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="340" y="366" text-anchor="middle" dominant-baseline="central">channel_id</text>
<text class="ts" x="340" y="382" text-anchor="middle" dominant-baseline="central">matches?</text>

<path d="M460 372 L560 372 L560 430" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="494" y="364" text-anchor="middle">No</text>
<rect x="480" y="430" width="160" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="560" y="446" text-anchor="middle" dominant-baseline="central" fill="#501313">Refuse:</text>
<text class="ts" x="560" y="462" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">InvalidCapability</text>

<line x1="340" y1="408" x2="340" y2="452" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="434" dominant-baseline="central">Yes</text>

<!-- E: is_closed? -->
<polygon points="340,452 440,484 340,516 240,484" fill="#F8F8F6" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="340" y="484" text-anchor="middle" dominant-baseline="central">is_closed?</text>

<path d="M440 484 L560 484 L560 542" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="494" y="476" text-anchor="middle">Yes</text>
<rect x="480" y="542" width="160" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="560" y="558" text-anchor="middle" dominant-baseline="central" fill="#501313">Refuse:</text>
<text class="ts" x="560" y="574" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">Closed</text>

<line x1="340" y1="516" x2="340" y2="560" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="542" dominant-baseline="central">No</text>

<!-- F: is_closing? -->
<polygon points="340,560 440,592 340,624 240,592" fill="#F8F8F6" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="340" y="592" text-anchor="middle" dominant-baseline="central">is_closing?</text>

<path d="M440 592 L560 592 L560 650" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="494" y="584" text-anchor="middle">Yes</text>
<rect x="480" y="650" width="160" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="560" y="666" text-anchor="middle" dominant-baseline="central" fill="#501313">Refuse:</text>
<text class="ts" x="560" y="682" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">ChannelDraining</text>

<line x1="340" y1="624" x2="340" y2="668" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="650" dominant-baseline="central">No</text>

<!-- G: backpressure::send_decision -->
<rect x="200" y="668" width="280" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="340" y="686" text-anchor="middle" dominant-baseline="central" fill="#412402">backpressure::send_decision</text>
<text class="ts" x="340" y="706" text-anchor="middle" dominant-baseline="central" fill="#854F0B">backpressure.rs</text>

<!-- G → Commit -->
<path d="M340 720 L340 784" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="755" dominant-baseline="central">None</text>

<!-- G → Defer -->
<path d="M200 694 L100 694 L100 800" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="88" y="748" text-anchor="end">Some Defer</text>

<!-- G → Refuse -->
<path d="M480 694 L580 694 L580 800" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="592" y="748" dominant-baseline="central">Some Refuse</text>

<!-- Commit -->
<rect x="230" y="784" width="220" height="44" rx="22" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="806" text-anchor="middle" dominant-baseline="central" fill="#04342C">Commit</text>

<!-- Defer -->
<rect x="30" y="800" width="160" height="52" rx="22" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="110" y="818" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Defer:</text>
<text class="ts" x="110" y="836" text-anchor="middle" dominant-baseline="central">WaitForCapacity</text>

<!-- Refuse backpressure -->
<rect x="500" y="800" width="160" height="52" rx="22" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="580" y="818" text-anchor="middle" dominant-baseline="central" fill="#501313">Refuse:</text>
<text class="ts" x="580" y="836" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">QueueFull / Backpressure</text>

<!-- Legend -->
<rect x="40" y="924" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="58" y="930" dominant-baseline="central">Entry / exit</text>
<rect x="160" y="924" width="12" height="12" rx="2" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="178" y="930" dominant-baseline="central">Refuse</text>
<rect x="238" y="924" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="256" y="930" dominant-baseline="central">Backpressure</text>
<rect x="358" y="924" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="376" y="930" dominant-baseline="central">Commit</text>
<rect x="432" y="924" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="450" y="930" dominant-baseline="central">Defer</text>
</svg>