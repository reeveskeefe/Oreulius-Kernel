<svg width="1100" height="560" viewBox="0 0 1100 560" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title {
        font-size: 20px;
        font-weight: 700;
        fill: #1f2937;
      }
      .participant-label {
        font-size: 14px;
        font-weight: 700;
        fill: #1f2937;
      }
      .participant-sub {
        font-size: 12.5px;
        font-weight: 500;
        fill: #4b5563;
      }
      .participant-box {
        stroke-width: 1;
      }
      .lifeline {
        stroke: #c7cbd1;
        stroke-width: 1.2;
        stroke-dasharray: 7 6;
      }
      .msg {
        stroke: #6b7280;
        stroke-width: 1.5;
        fill: none;
        marker-end: url(#arrow);
      }
      .reply {
        stroke: #9aa1aa;
        stroke-width: 1.4;
        stroke-dasharray: 7 5;
        fill: none;
        marker-end: url(#arrow-open);
      }
      .msg-text {
        font-size: 13px;
        font-weight: 500;
        fill: #374151;
      }
      .activation {
        fill: #e5e7eb;
        stroke: #9ca3af;
        stroke-width: 0.8;
      }
      .note-box {
        fill: #fff7ed;
        stroke: #f59e0b;
        stroke-width: 1;
      }
      .note-text {
        font-size: 12.5px;
        font-weight: 600;
        fill: #7c2d12;
      }
    </style>
  </defs>

  <text x="550" y="34" text-anchor="middle" class="title">Backpressure Refusal Sequence</text>

  <!-- Participants -->
  <rect x="40" y="60" width="120" height="44" rx="10" fill="#eeedfe" stroke="#534ab7" class="participant-box"/>
  <text x="100" y="78" text-anchor="middle" class="participant-label">P</text>
  <text x="100" y="94" text-anchor="middle" class="participant-sub">Process (PID 3)</text>

  <rect x="220" y="60" width="120" height="44" rx="10" fill="#eef4ff" stroke="#3b82f6" class="participant-box"/>
  <text x="280" y="78" text-anchor="middle" class="participant-label">SVC</text>
  <text x="280" y="94" text-anchor="middle" class="participant-sub">IpcService</text>

  <rect x="400" y="60" width="120" height="44" rx="10" fill="#fff7ed" stroke="#f59e0b" class="participant-box"/>
  <text x="460" y="78" text-anchor="middle" class="participant-label">BP</text>
  <text x="460" y="94" text-anchor="middle" class="participant-sub">backpressure.rs</text>

  <rect x="580" y="60" width="120" height="44" rx="10" fill="#f8f0ff" stroke="#8b5cf6" class="participant-box"/>
  <text x="640" y="78" text-anchor="middle" class="participant-label">ADM</text>
  <text x="640" y="94" text-anchor="middle" class="participant-sub">admission.rs</text>

  <rect x="760" y="52" width="250" height="60" rx="10" fill="#faece7" stroke="#993c1d" class="participant-box"/>
  <text x="885" y="73" text-anchor="middle" class="participant-label">CH</text>
  <text x="885" y="90" text-anchor="middle" class="participant-sub">Channel[5] · flags=ASYNC|BOUNDED</text>
  <text x="885" y="106" text-anchor="middle" class="participant-sub">n=3 (High)</text>

  <!-- Lifelines -->
  <line x1="100" y1="104" x2="100" y2="510" class="lifeline"/>
  <line x1="280" y1="104" x2="280" y2="510" class="lifeline"/>
  <line x1="460" y1="104" x2="460" y2="510" class="lifeline"/>
  <line x1="640" y1="104" x2="640" y2="510" class="lifeline"/>
  <line x1="885" y1="112" x2="885" y2="510" class="lifeline"/>

  <!-- Activations -->
  <rect x="274" y="138" width="12" height="260" rx="5" class="activation"/>
  <rect x="879" y="188" width="12" height="155" rx="5" class="activation"/>
  <rect x="634" y="240" width="12" height="82" rx="5" class="activation"/>

  <!-- P -> SVC -->
  <line x1="100" y1="150" x2="280" y2="150" class="msg"/>
  <text x="190" y="141" text-anchor="middle" class="msg-text">send_message_for_process(PID3, Channel5, data)</text>

  <!-- SVC -> CH -->
  <line x1="280" y1="205" x2="885" y2="205" class="msg"/>
  <text x="582" y="196" text-anchor="middle" class="msg-text">lock, observe → BackpressureLevel::High</text>

  <!-- SVC -> ADM -->
  <line x1="280" y1="260" x2="640" y2="260" class="msg"/>
  <text x="460" y="242" text-anchor="middle" class="msg-text">evaluate_send</text>
  <text x="460" y="260" text-anchor="middle" class="msg-text">→ send_decision(High, ASYNC, BOUNDED, !HIGH_PRIORITY)</text>
  <text x="460" y="278" text-anchor="middle" class="msg-text">→ Refuse(Backpressure)</text>

  <!-- ADM -> SVC -->
  <line x1="640" y1="330" x2="280" y2="330" class="reply"/>
  <text x="460" y="321" text-anchor="middle" class="msg-text">SendDecision::Refuse(Backpressure)</text>

  <!-- SVC -> CH -->
  <line x1="280" y1="385" x2="885" y2="385" class="msg"/>
  <text x="582" y="376" text-anchor="middle" class="msg-text">channel.record_send_refusal()</text>

  <!-- SVC -> P -->
  <line x1="280" y1="445" x2="100" y2="445" class="reply"/>
  <text x="190" y="436" text-anchor="middle" class="msg-text">Err(IpcError::WouldBlock)</text>

  <!-- Optional emphasis note -->
  <rect x="730" y="430" width="300" height="54" rx="10" class="note-box"/>
  <text x="750" y="451" class="note-text">Result:</text>
  <text x="798" y="451" class="msg-text">async bounded channel at high pressure</text>
  <text x="750" y="470" class="note-text">Policy:</text>
  <text x="798" y="470" class="msg-text">non-high-priority send is refused immediately</text>
</svg>