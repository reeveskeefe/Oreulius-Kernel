<svg width="1160" height="620" viewBox="0 0 1160 620" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-size:20px; font-weight:700; fill:#1f2937; }
      .participant-label { font-size:14px; font-weight:700; fill:#1f2937; }
      .participant-sub { font-size:12px; font-weight:500; fill:#4b5563; }
      .participant-box { stroke-width:1; }
      .lifeline {
        stroke:#cfd4dc;
        stroke-width:1.15;
        stroke-dasharray:7 6;
      }
      .msg {
        stroke:#6b7280;
        stroke-width:1.55;
        fill:none;
        marker-end:url(#arrow);
      }
      .reply {
        stroke:#98a1ab;
        stroke-width:1.4;
        stroke-dasharray:7 5;
        fill:none;
        marker-end:url(#arrow-open);
      }
      .msg-text {
        font-size:13px;
        font-weight:500;
        fill:#374151;
      }
      .activation {
        fill:#e5e7eb;
        stroke:#a6adb8;
        stroke-width:0.8;
      }
      .frame {
        fill:#fafafa;
        stroke:#d7dce3;
        stroke-width:1;
      }
      .frame-label {
        font-size:12px;
        font-weight:700;
        fill:#4b5563;
      }
      .note-box {
        fill:#fff7ed;
        stroke:#f59e0b;
        stroke-width:1;
      }
      .note-title {
        font-size:12px;
        font-weight:700;
        fill:#9a3412;
      }
      .note-text {
        font-size:12px;
        font-weight:500;
        fill:#7c2d12;
      }
    </style>
  </defs>

  <text x="580" y="34" text-anchor="middle" class="title">Predictive Restriction Refusal Sequence</text>

  <!-- Participant headers -->
  <rect x="40" y="58" width="120" height="52" rx="10" fill="#eeedfe" stroke="#534ab7" class="participant-box"/>
  <text x="100" y="77" text-anchor="middle" class="participant-label">P</text>
  <text x="100" y="94" text-anchor="middle" class="participant-sub">Process (PID 11)</text>
  <text x="100" y="107" text-anchor="middle" class="participant-sub">anomalous</text>

  <rect x="190" y="58" width="118" height="44" rx="10" fill="#eef4ff" stroke="#3b82f6" class="participant-box"/>
  <text x="249" y="76" text-anchor="middle" class="participant-label">SVC</text>
  <text x="249" y="92" text-anchor="middle" class="participant-sub">IpcService</text>

  <rect x="338" y="58" width="118" height="44" rx="10" fill="#f8f0ff" stroke="#8b5cf6" class="participant-box"/>
  <text x="397" y="76" text-anchor="middle" class="participant-label">ADM</text>
  <text x="397" y="92" text-anchor="middle" class="participant-sub">admission.rs</text>

  <rect x="486" y="58" width="138" height="44" rx="10" fill="#faeeda" stroke="#854f0b" class="participant-box"/>
  <text x="555" y="76" text-anchor="middle" class="participant-label">SEC</text>
  <text x="555" y="92" text-anchor="middle" class="participant-sub">SecurityService</text>

  <rect x="654" y="58" width="154" height="44" rx="10" fill="#faece7" stroke="#993c1d" class="participant-box"/>
  <text x="731" y="76" text-anchor="middle" class="participant-label">CAP</text>
  <text x="731" y="92" text-anchor="middle" class="participant-sub">CapabilityManager</text>

  <rect x="838" y="58" width="126" height="44" rx="10" fill="#eefbf5" stroke="#10b981" class="participant-box"/>
  <text x="901" y="76" text-anchor="middle" class="participant-label">AUDIT</text>
  <text x="901" y="92" text-anchor="middle" class="participant-sub">Audit Log</text>

  <rect x="994" y="58" width="126" height="44" rx="10" fill="#f3f4f6" stroke="#6b7280" class="participant-box"/>
  <text x="1057" y="76" text-anchor="middle" class="participant-label">CH</text>
  <text x="1057" y="92" text-anchor="middle" class="participant-sub">Channel</text>

  <!-- Lifelines -->
  <line x1="100" y1="110" x2="100" y2="585" class="lifeline"/>
  <line x1="249" y1="102" x2="249" y2="585" class="lifeline"/>
  <line x1="397" y1="102" x2="397" y2="585" class="lifeline"/>
  <line x1="555" y1="102" x2="555" y2="585" class="lifeline"/>
  <line x1="731" y1="102" x2="731" y2="585" class="lifeline"/>
  <line x1="901" y1="102" x2="901" y2="585" class="lifeline"/>
  <line x1="1057" y1="102" x2="1057" y2="585" class="lifeline"/>

  <!-- Main frame -->
  <rect x="26" y="126" width="1098" height="410" rx="12" class="frame"/>
  <text x="42" y="145" class="frame-label">Refusal path · predictive restriction active</text>

  <!-- Activations -->
  <rect x="243" y="150" width="12" height="360" rx="5" class="activation"/>
  <rect x="391" y="240" width="12" height="48" rx="5" class="activation"/>
  <rect x="549" y="182" width="12" height="190" rx="5" class="activation"/>
  <rect x="725" y="335" width="12" height="44" rx="5" class="activation"/>
  <rect x="895" y="430" width="12" height="44" rx="5" class="activation"/>
  <rect x="1051" y="475" width="12" height="44" rx="5" class="activation"/>

  <!-- Outcome note -->
  <rect x="868" y="136" width="216" height="52" rx="10" class="note-box"/>
  <text x="886" y="156" class="note-title">Outcome</text>
  <text x="886" y="174" class="note-text">send blocked by predictive policy</text>

  <!-- Messages -->
  <line x1="100" y1="170" x2="249" y2="170" class="msg"/>
  <text x="142" y="161" class="msg-text">send(msg, cap)</text>

  <line x1="249" y1="215" x2="555" y2="215" class="msg"/>
  <text x="265" y="206" class="msg-text">is_predictively_restricted(PID11, Channel, SEND) → true</text>

  <line x1="249" y1="260" x2="397" y2="260" class="msg"/>
  <text x="265" y="251" class="msg-text">evaluate_send(...)</text>

  <line x1="397" y1="300" x2="249" y2="300" class="reply"/>
  <text x="273" y="291" class="msg-text">SendDecision::Refuse(PredictiveRestriction)</text>

  <line x1="249" y1="345" x2="555" y2="345" class="msg"/>
  <text x="265" y="336" class="msg-text">restriction_until_tick(PID11) → tick=9450</text>

  <line x1="249" y1="390" x2="731" y2="390" class="msg"/>
  <text x="265" y="381" class="msg-text">predictive_revoke_capabilities(PID11, Channel, SEND, tick=9450)</text>

  <line x1="249" y1="435" x2="555" y2="435" class="msg"/>
  <text x="265" y="426" class="msg-text">intent_capability_denied(PID11, Channel, SEND, channel_id)</text>

  <line x1="249" y1="480" x2="901" y2="480" class="msg"/>
  <text x="265" y="471" class="msg-text">log_event(AuditEntry::PermissionDenied, PID11, cap_id, channel_id)</text>

  <line x1="249" y1="525" x2="1057" y2="525" class="msg"/>
  <text x="265" y="516" class="msg-text">record_send_refusal() → temporal log entry</text>

  <line x1="249" y1="565" x2="100" y2="565" class="reply"/>
  <text x="132" y="556" class="msg-text">Err(IpcError::PermissionDenied)</text>
</svg>