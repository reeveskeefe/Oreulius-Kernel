<svg width="680" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-size:14px; font-weight:600; }
    .ts { font-size:12px; font-weight:400; fill:#555555; }
  </style>
</defs>

<!-- Initial node -->
<circle cx="340" cy="40" r="12" fill="#1a1a1a"/>
<circle cx="340" cy="40" r="8" fill="#ffffff"/>
<circle cx="340" cy="40" r="5" fill="#1a1a1a"/>

<!-- [*] → Open -->
<line x1="340" y1="52" x2="340" y2="110" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="84" dominant-baseline="central">Channel::new()</text>

<!-- OPEN -->
<rect x="200" y="110" width="280" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central" fill="#04342C">Open</text>

<!-- Open self-loop -->
<path d="M480 138 Q560 138 560 152 Q560 180 480 180 L480 166" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="525" y="152" dominant-baseline="central">send()</text>
<text class="ts" x="525" y="168" dominant-baseline="central">recv()</text>

<!-- Open → Draining -->
<path d="M200 138 L100 138 L100 300" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="88" y="200" text-anchor="end">close(),</text>
<text class="ts" x="88" y="216" text-anchor="end">buffer</text>
<text class="ts" x="88" y="232" text-anchor="end">non-empty</text>

<!-- Open → Sealed -->
<path d="M480 138 L580 138 L580 300" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="592" y="200" dominant-baseline="central">close(),</text>
<text class="ts" x="592" y="216" dominant-baseline="central">buffer</text>
<text class="ts" x="592" y="232" dominant-baseline="central">empty</text>

<!-- DRAINING -->
<rect x="40" y="300" width="200" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="140" y="328" text-anchor="middle" dominant-baseline="central" fill="#412402">Draining</text>

<!-- Draining self-loop -->
<path d="M140 356 Q140 410 200 410 Q260 410 260 356 L220 356" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="200" y="428" text-anchor="middle">recv() drains messages</text>

<!-- SEALED -->
<rect x="480" y="300" width="200" height="56" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="580" y="328" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Sealed</text>

<!-- Draining → Sealed -->
<path d="M240 328 L480 328" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="360" y="314" text-anchor="middle">last message drained, buffer empty</text>

<!-- Sealed → terminal -->
<line x1="580" y1="356" x2="580" y2="520" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="592" y="440" dominant-baseline="central">deleted from table</text>

<!-- Terminal node -->
<circle cx="580" cy="534" r="14" fill="#1a1a1a"/>
<circle cx="580" cy="534" r="9" fill="#1a1a1a" stroke="#ffffff" stroke-width="3"/>

<!-- Legend -->
<rect x="40" y="594" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="58" y="600" dominant-baseline="central">Active (normal ops)</text>
<rect x="200" y="594" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="218" y="600" dominant-baseline="central">Draining (read-only)</text>
<rect x="370" y="594" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="388" y="600" dominant-baseline="central">Sealed (no ops)</text>
</svg>