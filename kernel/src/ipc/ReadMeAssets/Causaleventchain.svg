<svg width="680" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-size:14px; font-weight:600; }
    .ts { font-size:12px; font-weight:400; fill:#555555; }
  </style>
</defs>

<!-- E1 -->
<rect x="30" y="60" width="180" height="80" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="120" y="88" text-anchor="middle" dominant-baseline="central" fill="#26215C">EventId(P1, 0, 0)</text>
<text class="ts" x="120" y="110" text-anchor="middle" dominant-baseline="central">cause: None</text>
<text class="ts" x="120" y="126" text-anchor="middle" dominant-baseline="central">root</text>

<!-- E1 → E2 -->
<line x1="210" y1="100" x2="250" y2="100" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- E2 -->
<rect x="250" y="60" width="180" height="80" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="88" text-anchor="middle" dominant-baseline="central" fill="#04342C">EventId(P2, 0, 1)</text>
<text class="ts" x="340" y="110" text-anchor="middle" dominant-baseline="central">cause: E1</text>
<text class="ts" x="340" y="126" text-anchor="middle" dominant-baseline="central">response</text>

<!-- E2 → E3 -->
<line x1="430" y1="100" x2="470" y2="100" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- E3 -->
<rect x="470" y="60" width="180" height="80" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="560" y="88" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">EventId(P1, 0, 2)</text>
<text class="ts" x="560" y="110" text-anchor="middle" dominant-baseline="central">cause: E2</text>
<text class="ts" x="560" y="126" text-anchor="middle" dominant-baseline="central">acknowledgement</text>

<!-- Legend -->
<rect x="30" y="178" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="48" y="184" dominant-baseline="central">Root</text>
<rect x="106" y="178" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="124" y="184" dominant-baseline="central">Response</text>
<rect x="210" y="178" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="228" y="184" dominant-baseline="central">Acknowledgement</text>
</svg>