<svg width="680" viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-size:14px; font-weight:600; }
    .ts { font-size:12px; font-weight:400; fill:#555555; }
  </style>
</defs>

<!-- Entry -->
<rect x="100" y="24" width="480" height="44" rx="22" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="46" text-anchor="middle" dominant-baseline="central" fill="#26215C">create_channel_for_process_with_flags</text>

<line x1="340" y1="68" x2="340" y2="112" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- B: table.len >= MAX_CHANNELS? -->
<polygon points="340,112 490,152 340,192 190,152" fill="#F8F8F6" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="340" y="146" text-anchor="middle" dominant-baseline="central">table.len &gt;= MAX_CHANNELS?</text>

<!-- B Yes → Err -->
<path d="M490 152 L590 152 L590 210" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="536" y="144" text-anchor="middle">Yes</text>
<rect x="510" y="210" width="160" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="590" y="226" text-anchor="middle" dominant-baseline="central" fill="#501313">Err:</text>
<text class="ts" x="590" y="242" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">TooManyChannels</text>

<!-- B No → C -->
<line x1="340" y1="192" x2="340" y2="236" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="218" dominant-baseline="central">No</text>

<!-- C: Insert Channel into BTreeMap -->
<rect x="180" y="236" width="320" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="258" text-anchor="middle" dominant-baseline="central" fill="#04342C">Insert channel into BTreeMap</text>

<line x1="340" y1="280" x2="340" y2="324" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- D: alloc_channel_cap_id x2 -->
<rect x="140" y="324" width="400" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="344" text-anchor="middle" dominant-baseline="central" fill="#04342C">alloc_channel_cap_id ×2</text>
<text class="ts" x="340" y="364" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">next_cap_id fetch_add, skipping zero</text>

<line x1="340" y1="380" x2="340" y2="424" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- E: Build send_cap / recv_cap -->
<rect x="120" y="424" width="440" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="444" text-anchor="middle" dominant-baseline="central" fill="#04342C">Build send_cap with SEND right</text>
<text class="ts" x="340" y="464" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Build recv_cap with RECEIVE right</text>

<line x1="340" y1="480" x2="340" y2="524" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- F: capability_manager.grant_capability for both -->
<rect x="140" y="524" width="400" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="340" y="546" text-anchor="middle" dominant-baseline="central" fill="#412402">capability_manager.grant_capability for both</text>

<!-- F Ok → G -->
<path d="M340 568 L340 632" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="603" dominant-baseline="central">Ok</text>

<!-- F Err → H -->
<path d="M540 546 L610 546 L610 640" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="598" y="590" dominant-baseline="central">Err</text>

<!-- G: return Ok -->
<rect x="180" y="632" width="320" height="44" rx="22" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="654" text-anchor="middle" dominant-baseline="central" fill="#04342C">return Ok(channel_id.0 as usize)</text>

<!-- H: delete_channel; return Err -->
<rect x="520" y="640" width="148" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="594" y="658" text-anchor="middle" dominant-baseline="central" fill="#501313">delete_channel</text>
<text class="ts" x="594" y="678" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">return Err</text>

<!-- Legend -->
<rect x="40" y="780" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="58" y="786" dominant-baseline="central">Entry</text>
<rect x="112" y="780" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="130" y="786" dominant-baseline="central">Construction steps</text>
<rect x="276" y="780" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="294" y="786" dominant-baseline="central">Capability grant</text>
<rect x="420" y="780" width="12" height="12" rx="2" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="438" y="786" dominant-baseline="central">Error paths</text>
</svg>