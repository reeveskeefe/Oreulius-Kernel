<svg width="680" viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-size:14px; font-weight:600; }
    .ts { font-size:12px; font-weight:400; fill:#555555; }
  </style>
</defs>

<!-- evaluate_recv entry -->
<rect x="230" y="24" width="220" height="44" rx="22" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="46" text-anchor="middle" dominant-baseline="central" fill="#26215C">evaluate_recv</text>

<line x1="340" y1="68" x2="340" y2="112" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- B: Predictively restricted? -->
<polygon points="340,112 460,148 340,184 220,148" fill="#F8F8F6" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="340" y="142" text-anchor="middle" dominant-baseline="central">Predictively</text>
<text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">restricted?</text>

<path d="M460 148 L560 148 L560 206" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="506" y="140" text-anchor="middle">Yes</text>
<rect x="480" y="206" width="160" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="560" y="222" text-anchor="middle" dominant-baseline="central" fill="#501313">Refuse:</text>
<text class="ts" x="560" y="238" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">PredictiveRestriction</text>

<line x1="340" y1="184" x2="340" y2="228" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="210" dominant-baseline="central">No</text>

<!-- C: can_receive? -->
<polygon points="340,228 440,260 340,292 240,260" fill="#F8F8F6" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="340" y="260" text-anchor="middle" dominant-baseline="central">can_receive?</text>

<path d="M440 260 L560 260 L560 318" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="494" y="252" text-anchor="middle">No</text>
<rect x="480" y="318" width="160" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="560" y="334" text-anchor="middle" dominant-baseline="central" fill="#501313">Refuse:</text>
<text class="ts" x="560" y="350" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">PermissionDenied</text>

<line x1="340" y1="292" x2="340" y2="336" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="318" dominant-baseline="central">Yes</text>

<!-- D: channel_id matches? -->
<polygon points="340,336 460,372 340,408 220,372" fill="#F8F8F6" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="340" y="366" text-anchor="middle" dominant-baseline="central">channel_id</text>
<text class="ts" x="340" y="382" text-anchor="middle" dominant-baseline="central">matches?</text>

<path d="M460 372 L560 372 L560 430" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="494" y="364" text-anchor="middle">No</text>
<rect x="480" y="430" width="160" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="560" y="446" text-anchor="middle" dominant-baseline="central" fill="#501313">Refuse:</text>
<text class="ts" x="560" y="462" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">InvalidCapability</text>

<line x1="340" y1="408" x2="340" y2="452" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="434" dominant-baseline="central">Yes</text>

<!-- E: is_closed AND buffer empty? -->
<polygon points="340,452 470,492 340,532 210,492" fill="#F8F8F6" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="340" y="482" text-anchor="middle" dominant-baseline="central">is_closed AND</text>
<text class="ts" x="340" y="498" text-anchor="middle" dominant-baseline="central">buffer empty?</text>

<path d="M470 492 L560 492 L560 550" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="510" y="484" text-anchor="middle">Yes</text>
<rect x="480" y="550" width="160" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="560" y="566" text-anchor="middle" dominant-baseline="central" fill="#501313">Refuse:</text>
<text class="ts" x="560" y="582" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">Closed</text>

<line x1="340" y1="532" x2="340" y2="576" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="558" dominant-baseline="central">No</text>

<!-- F: buffer empty? -->
<polygon points="340,576 440,608 340,640 240,608" fill="#F8F8F6" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="340" y="608" text-anchor="middle" dominant-baseline="central">buffer empty?</text>

<!-- F Yes → Defer -->
<path d="M240 608 L120 608 L120 706" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="108" y="660" text-anchor="end">Yes</text>
<rect x="30" y="706" width="180" height="52" rx="22" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="120" y="724" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Defer:</text>
<text class="ts" x="120" y="742" text-anchor="middle" dominant-baseline="central">WaitForMessage</text>

<!-- F No → Deliver -->
<line x1="340" y1="640" x2="340" y2="706" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="676" dominant-baseline="central">No</text>
<rect x="230" y="706" width="220" height="44" rx="22" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="728" text-anchor="middle" dominant-baseline="central" fill="#04342C">Deliver</text>

<!-- Legend -->
<rect x="40" y="800" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="58" y="806" dominant-baseline="central">Entry / exit</text>
<rect x="160" y="800" width="12" height="12" rx="2" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="178" y="806" dominant-baseline="central">Refuse</text>
<rect x="238" y="800" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="256" y="806" dominant-baseline="central">Deliver</text>
<rect x="318" y="800" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="336" y="806" dominant-baseline="central">Defer</text>
</svg>