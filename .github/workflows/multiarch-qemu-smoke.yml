name: multiarch-qemu-smoke

on:
  push:
    paths:
      - "kernel/**"
      - ".github/workflows/multiarch-qemu-smoke.yml"
  pull_request:
    paths:
      - "kernel/**"
      - ".github/workflows/multiarch-qemu-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        arch: [i686, x86_64, aarch64]

    defaults:
      run:
        shell: bash
        working-directory: kernel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            expect \
            xorriso \
            grub-pc-bin \
            grub-common \
            mtools \
            qemu-system-x86 \
            qemu-system-arm \
            binutils-aarch64-linux-gnu

      - name: Install Rust nightly (kernel toolchain)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2023-11-01

      - name: Make scripts executable
        run: chmod +x ./build*.sh ./run*.sh ./ci/*.sh

      - name: Run i686 QEMU shell smoke
        if: matrix.arch == 'i686'
        env:
          QEMU_AUDIO_DRV: none
        run: ./ci/smoke-i686.sh

      - name: Run x86_64 QEMU shell smoke
        if: matrix.arch == 'x86_64'
        env:
          QEMU_AUDIO_DRV: none
        run: ./ci/smoke-x86_64.sh

      - name: Run AArch64 QEMU shell smoke (VFS/block)
        if: matrix.arch == 'aarch64'
        env:
          AS_BIN: aarch64-linux-gnu-as
          LD_BIN: aarch64-linux-gnu-ld
          OBJCOPY_BIN: aarch64-linux-gnu-objcopy
          QEMU_AUDIO_DRV: none
        run: ./ci/smoke-aarch64.sh

