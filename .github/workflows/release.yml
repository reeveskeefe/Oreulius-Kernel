name: release

on:
  workflow_dispatch: {}

defaults:
  run:
    shell: bash

permissions:
  contents: write      # create GitHub Release + upload assets (tag push)
  packages: read       # packaging/push reserved for package.yml

env:
  REGISTRY: ghcr.io
  NAMESPACE: reeveskeefe

jobs:
  release-preflight:
    name: Release preflight
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      pkg_name: ${{ steps.meta.outputs.pkg_name }}
      pkg_version: ${{ steps.meta.outputs.pkg_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity for release tags
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read release name & version from Cargo.toml
        id: meta
        run: |
          set -euo pipefail
          file=kernel/Cargo.toml
          if [[ ! -f "$file" ]]; then
            echo "::error::Missing $file"
            exit 1
          fi
          pkg_name=$(awk -F'"' '/^name[[:space:]]*=/ { print $2; exit }' "$file")
          pkg_version=$(awk -F'"' '/^version[[:space:]]*=/ { print $2; exit }' "$file")
          if [[ -z "$pkg_name" || -z "$pkg_version" ]]; then
            echo "::error::Failed to parse package name/version from $file"
            exit 1
          fi
          tag="${pkg_name}-${pkg_version}"
          echo "pkg_name=$pkg_name" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$pkg_version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Validate or create tag pointing to this commit
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          echo "Checking remote for tag $TAG"
          remote_ref_sha=$(git ls-remote --tags origin "refs/tags/${TAG}" | awk '{print $1}' | tail -n 1 || true)
          remote_commit_sha=$(git ls-remote --tags origin "refs/tags/${TAG}^{}" | awk '{print $1}' | tail -n 1 || true)
          if [[ -n "$remote_ref_sha" ]]; then
            if [[ -z "$remote_commit_sha" ]]; then
              remote_commit_sha="$remote_ref_sha"
            fi
            if [[ "$remote_commit_sha" != "$GITHUB_SHA" ]]; then
              echo "::error::Requested tag ${TAG} already points to ${remote_commit_sha:0:7}, but this run is building ${GITHUB_SHA:0:7}."
              exit 1
            else
              echo "Tag ${TAG} already exists and matches current commit."
            fi
          else
            echo "Creating and pushing tag ${TAG}"
            git tag -a "${TAG}" -m "Release ${TAG}" "${GITHUB_SHA}"
            git push origin "${TAG}"
          fi

      - name: Verify packaging Dockerfiles exist
        run: |
          missing=0
          for file in \
            docker/Dockerfile.toolchain \
            docker/Dockerfile.runner \
            docker/Dockerfile.artifacts
          do
            if [[ ! -f "$file" ]]; then
              echo "::error::Missing required release packaging file: $file"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "::error::This commit does not contain the full release packaging set."
            exit 1
          fi

      - name: Validate manual release tag matches current commit
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          remote_ref_sha="$(git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | awk '{print $1}' | tail -n 1 || true)"
          remote_commit_sha="$(git ls-remote --tags origin "refs/tags/${RELEASE_TAG}^{}" | awk '{print $1}' | tail -n 1 || true)"
          if [[ -z "$remote_commit_sha" ]]; then
            remote_commit_sha="$remote_ref_sha"
          fi
          if [[ -n "$remote_commit_sha" && "$remote_commit_sha" != "$GITHUB_SHA" ]]; then
            echo "::error::Requested tag ${RELEASE_TAG} already points to ${remote_commit_sha:0:7}, but this run is building ${GITHUB_SHA:0:7}."
            echo "::error::Use a new tag (for example ${RELEASE_TAG}.1) or move the protected tag in GitHub before re-running the release workflow."
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Build all three kernel architectures and upload as GHA artifacts.
  # Mirrors the multiarch-qemu-smoke.yml dependency/tool chain exactly.
  # ────────────────────────────────────────────────────────────────────────────
  build-kernel:
    name: Build kernel (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    needs: [release-preflight]

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i686
            build_cmd: ./build.sh
            artifacts: |
              target/oreulius-kernel
              oreulius.iso
            artifact_name: kernel-i686

          - arch: x86_64
            build_cmd: ./build-x86_64-full.sh && ./build-x86_64-mb2-iso.sh
            artifacts: |
              target/x86_64-mb2/oreulius-kernel-x86_64
              target/x86_64-mb2/oreulius-x86_64-mb2.iso
            artifact_name: kernel-x86_64

          - arch: aarch64
            build_cmd: ./build-aarch64-virt.sh
            artifacts: |
              target/aarch64-virt/oreulius-kernel-aarch64-virt
              target/aarch64-virt/Image
            artifact_name: kernel-aarch64

    defaults:
      run:
        working-directory: kernel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            lld \
            xorriso \
            grub-pc-bin \
            grub-common \
            mtools \
            qemu-system-x86 \
            qemu-system-arm \
            binutils-aarch64-linux-gnu

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2024-01-01
          components: rust-src,llvm-tools

      - name: Add rust-src component
        run: |
          rustup component add rust-src \
            --toolchain nightly-2024-01-01-x86_64-unknown-linux-gnu

      - name: Make scripts executable
        run: chmod +x ./build*.sh

      - name: Build kernel (${{ matrix.arch }})
        env:
          AS_BIN: ${{ matrix.arch == 'aarch64' && 'aarch64-linux-gnu-as' || '' }}
          LD_BIN: ${{ matrix.arch == 'aarch64' && 'aarch64-linux-gnu-ld' || '' }}
          OBJCOPY_BIN: ${{ matrix.arch == 'aarch64' && 'aarch64-linux-gnu-objcopy' || '' }}
        run: ${{ matrix.build_cmd }}

      - name: Stage artifacts
        run: |
          mkdir -p /tmp/staged/${{ matrix.arch }}
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            cp "$f" /tmp/staged/${{ matrix.arch }}/
          done <<'EOF'
          ${{ matrix.artifacts }}
          EOF

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: /tmp/staged/${{ matrix.arch }}/
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Build and push the toolchain image (runs in parallel with build-kernel).
  # ────────────────────────────────────────────────────────────────────────────
  # Packaging (images) intentionally moved to package.yml

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Build and push runner images (i686 and x86_64).
  # Waits for build-kernel (needs the compiled ISOs) and package-toolchain
  # (runner FROM-references the toolchain image).
  # ────────────────────────────────────────────────────────────────────────────
  # Packaging (images) intentionally moved to package.yml

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4: Assemble OCI artifact image from all three arch builds and push.
  # ────────────────────────────────────────────────────────────────────────────
  # Packaging (OCI artifacts) intentionally moved to package.yml

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5: Create a GitHub Release with all kernel binaries attached.
  # ────────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [release-preflight, build-kernel]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download i686 artifacts
        uses: actions/download-artifact@v4
        with:
          name: kernel-i686
          path: release-assets/

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: kernel-x86_64
          path: release-assets/

      - name: Download aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: kernel-aarch64
          path: release-assets/

      - name: Rename assets to include arch suffix
        run: |
          cd release-assets
          # Rename flat-downloaded files; download-artifact merges into one dir
          [[ -f oreulius-kernel ]]                  && mv oreulius-kernel                  oreulius-kernel-i686
          [[ -f oreulius.iso ]]                     && mv oreulius.iso                     oreulius-i686.iso
          [[ -f oreulius-kernel-x86_64 ]]           && : # already named
          [[ -f oreulius-x86_64-mb2.iso ]]          && : # already named
          [[ -f oreulius-kernel-aarch64-virt ]]     && : # already named
          [[ -f Image ]]                            && mv Image                            oreulius-aarch64-Image
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-preflight.outputs.tag }}
          name: "${{ needs.release-preflight.outputs.pkg_name }} ${{ needs.release-preflight.outputs.pkg_version }}"
          draft: true
          prerelease: true
          body: |
            ## ${{ needs.release-preflight.outputs.pkg_name }} ${{ needs.release-preflight.outputs.tag }}

            Capability-native, WASM-first kernel for isolated workloads with temporal state
            and verification-oriented control surfaces.

            ### Architectures
            | Arch | Format | Package |
            |------|--------|---------|
            | i686 | Multiboot1 ISO + ELF | attached below |
            | x86_64 | Multiboot2 ISO + ELF | attached below |
            | aarch64 | ELF + raw Image | attached below |

            ### Container Images
            ```
            # Reproducible build toolchain
            docker pull ghcr.io/${{ env.NAMESPACE }}/oreulius-kernel-toolchain:${{ needs.release-preflight.outputs.tag }}

            # Boot in QEMU (i686)
            docker pull ghcr.io/${{ env.NAMESPACE }}/oreulius-kernel-runner-i686:${{ needs.release-preflight.outputs.tag }}
            docker run --rm -it ghcr.io/${{ env.NAMESPACE }}/oreulius-kernel-runner-i686:${{ needs.release-preflight.outputs.tag }}

            # Boot in QEMU (x86_64)
            docker pull ghcr.io/${{ env.NAMESPACE }}/oreulius-kernel-runner-x86_64:${{ needs.release-preflight.outputs.tag }}
            docker run --rm -it ghcr.io/${{ env.NAMESPACE }}/oreulius-kernel-runner-x86_64:${{ needs.release-preflight.outputs.tag }}

            # All binaries as OCI artifact
            id=$(docker create ghcr.io/${{ env.NAMESPACE }}/oreulius-kernel-artifacts:${{ needs.release-preflight.outputs.tag }})
            docker cp "$id":/artifacts ./artifacts && docker rm "$id"
            ```

            ### License
            Oreulius Community License — research/non-commercial use. See [LICENSE](LICENSE).
          files: release-assets/*
          fail_on_unmatched_files: false

      - name: Publish GitHub Release
        uses: actions/github-script@v6
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG || '';
            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            if (!release.data.draft) {
              core.info(`Release ${tag} is already published.`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.data.id,
              draft: false,
            });
            core.info(`Published GitHub Release for ${tag}.`);

  trigger-package:
    name: Trigger packaging workflow and wait
    runs-on: ubuntu-22.04
    needs: [release-preflight, github-release]
    steps:
      - name: Trigger `package.yml` via workflow_dispatch
        uses: actions/github-script@v6
        env:
          PKG_TAG: ${{ needs.release-preflight.outputs.tag }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.PKG_TAG || '';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'package.yml',
              ref: tag,
              inputs: { version: tag }
            });
            core.info(`Dispatched package.yml for ref '${tag}'`);

      - name: Wait for package workflow run to complete
        uses: actions/github-script@v6
        env:
          PKG_TAG: ${{ needs.release-preflight.outputs.tag }}
          CHECK_INTERVAL_SECONDS: '15'
          TIMEOUT_MIN: '120'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = 'package.yml';
            const tag = process.env.PKG_TAG || '';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const intervalMs = parseInt(process.env.CHECK_INTERVAL_SECONDS || '15', 10) * 1000;
            const timeoutMs = parseInt(process.env.TIMEOUT_MIN || '120', 10) * 60 * 1000;
            const deadline = Date.now() + timeoutMs;
            core.info(`Waiting for workflow '${workflow}' triggered for tag '${tag}'`);
            while (Date.now() < deadline) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner, repo, workflow_id: workflow, per_page: 100
              });
              const run = runs.data.workflow_runs.find(r => r.head_branch === tag);
              if (run) {
                core.info(`Found run ${run.html_url} — status=${run.status} conclusion=${run.conclusion}`);
                if (run.status === 'completed') {
                  if (run.conclusion === 'success') {
                    core.info('Package workflow succeeded.');
                    return;
                  }
                  throw new Error(`Package workflow completed with conclusion: ${run.conclusion}`);
                }
              } else {
                core.info('No matching workflow run found yet, retrying...');
              }
              await new Promise(res => setTimeout(res, intervalMs));
            }
            throw new Error('Timed out waiting for package workflow run.');
