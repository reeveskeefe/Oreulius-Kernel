name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (for example v0.1.1-alpha.1)"
        required: true

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  source-release:
    name: Publish source release
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          target_commitish: ${{ github.sha }}
          name: "Source release ${{ inputs.version }}"
          draft: false
          prerelease: true
          body: |
            Source-only release for ${{ inputs.version }}.
            Binary artifacts and OCI packages are published separately by `package.yml`.
